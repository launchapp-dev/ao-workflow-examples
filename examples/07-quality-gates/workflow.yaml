    workflow_ref: docs-audit
    enabled: true

  - id: devops-audit
    cron: "30 */6 * * *"
    workflow_ref: devops-audit
    enabled: true

  - id: smoke-test
    cron: "0 * * * *"
    workflow_ref: smoke-test
    enabled: true

  - id: research-scout
