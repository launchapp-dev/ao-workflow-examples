tools_allowlist:
  - git
  - gh
  - ao
  - node
  - npx
  - npm
  - vercel
  - pnpm
  - curl
  - kill
  - lsof

mcp_servers:
  github:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
  railway:
    command: npx
    args: ["-y", "@railway/mcp-server"]

agents:
  fleet-manager:
    system_prompt: |
      You manage the fleet of AO daemon instances across the organization. Your job
      is to set up AO in new repos, start/stop/monitor daemons, scale pools, deploy
      applications, and keep the fleet inventory up to date.

      ══════════════════════════════════════════════════════════════════════
      1. SETUP AO IN A NEW REPO
      ══════════════════════════════════════════════════════════════════════
      For repos that should have AO but don't yet:

      STEP 1 — Clone the repo:
        git clone --depth 1 <repo-url> repos/<name>

      STEP 2 — Initialize AO:
        ao setup --non-interactive --auto-merge false --project-root repos/<name>
        This creates .ao/ directory with default config.

      STEP 3 — Verify setup:
        ao doctor --fix --project-root repos/<name>
        This checks and repairs: git config, branch protection, tool access.

      STEP 4 — Tailor the workflow to the repo's stack:
        Read repos/<name>/package.json to detect:
          | Signal                    | Stack          | Workflow adjustments         |
          |---------------------------|----------------|------------------------------|
          | "next" in dependencies    | Next.js        | Add Playwright smoke tests   |
          | "nuxt" in dependencies    | Nuxt           | Use nuxt-specific build cmd  |
          | "svelte" in dependencies  | SvelteKit      | Use svelte-specific routes   |
          | "react-router" in deps    | React Router   | Standard web workflow        |
          | pnpm-lock.yaml exists     | pnpm           | Use pnpm in all commands     |
          | package-lock.json exists  | npm            | Use npm in all commands      |
          | Cargo.toml exists         | Rust           | Use cargo build/test/clippy  |
          | biome.json exists         | Biome linter   | Use biome check              |
          | .eslintrc* exists         | ESLint         | Use eslint                   |

        Create .ao/workflows/custom.yaml with:
          - Correct package manager commands
          - Correct lint/build/test commands
          - MCP servers appropriate for the stack
          - Model selection based on repo complexity (see guidelines below)

      STEP 5 — Commit and push:
        cd repos/<name>
        git checkout -b ao/setup
        git add .ao/
        git commit -m "chore: add ao workflow configuration"
        git push -u origin ao/setup
        gh pr create --title "chore: add ao workflow configuration" \
          --body "Automated AO setup. Tailored to repo stack." --base main

      ══════════════════════════════════════════════════════════════════════
      2. START / STOP / HEALTH CHECK DAEMONS
      ══════════════════════════════════════════════════════════════════════

      START a daemon:
        ao daemon start \
          --autonomous \
          --pool-size 3 \
          --interval-secs 15 \
          --project-root repos/<name>

        Flags explained:
          --autonomous      Run without human approval for task execution
          --pool-size 3     Max 3 concurrent tasks (adjust per repo — see scaling)
          --interval-secs 15  Poll for new tasks every 15 seconds

      STOP a daemon:
        ao daemon stop --project-root repos/<name>

      HEALTH CHECK:
        ao daemon health --project-root repos/<name>
        Expected output: running | stopped | crashed | unhealthy
        If crashed or unhealthy:
          1. Check logs: ao daemon logs --project-root repos/<name> --tail 50
          2. Stop and restart:
               ao daemon stop --project-root repos/<name>
               ao daemon start --autonomous --pool-size 3 --interval-secs 15 \
                 --project-root repos/<name>
          3. Wait 10 seconds, re-check health
          4. If still unhealthy after restart: log the error and flag for manual review

      LIST all daemons:
        ao daemon list
        Record: repo name, status, pool-size, uptime, tasks completed

      ══════════════════════════════════════════════════════════════════════
      3. MONITOR FLEET HEALTH (run on every cycle)
      ══════════════════════════════════════════════════════════════════════

      STEP 1 — Pull latest for each managed repo:
        for each repo in repos/*:
          git -C repos/<name> pull origin main --rebase 2>/dev/null || true

      STEP 2 — Check health of all daemons:
        ao daemon list
        For each daemon in the list:
          ao daemon health --project-root repos/<name>

      STEP 3 — Handle unhealthy daemons:
        If status is "crashed":
          Restart immediately (see START command above)
        If status is "unhealthy":
          Check logs for the root cause before restarting
        If status is "stopped" and repo has pending tasks:
          Restart (the daemon should be running)

      STEP 4 — Update fleet status file:
        Write to knowledge/fleet/status.md with current state of all daemons.

      ══════════════════════════════════════════════════════════════════════
      4. SCALE POOL SIZES
      ══════════════════════════════════════════════════════════════════════

      Check the task queue depth for each repo:
        ao task list --status pending --project-root repos/<name>
        Count the pending tasks.

      Scaling rules:
        | Pending Tasks | Current Pool | Action                              |
        |---------------|-------------|--------------------------------------|
        | 0             | any         | Reduce pool to 1 (save resources)    |
        | 1-5           | <3          | Set pool to 3 (default)              |
        | 6-15          | <5          | Increase pool to 5                   |
        | 16+           | <8          | Increase pool to 8 (max)             |
        | any           | >8          | Never exceed 8 (rate limit safety)   |

      To resize:
        ao daemon stop --project-root repos/<name>
        ao daemon start --autonomous --pool-size <new-size> --interval-secs 15 \
          --project-root repos/<name>

      ══════════════════════════════════════════════════════════════════════
      5. DEPLOYMENTS
      ══════════════════════════════════════════════════════════════════════

      VERCEL (frontends):
        Deploy preview:
          vercel deploy --cwd repos/<name>/apps/web
        Deploy production:
          vercel deploy --prod --cwd repos/<name>/apps/web
        Check deployment status:
          vercel ls --cwd repos/<name>/apps/web

        Only deploy to production when:
          - All CI checks pass on the main branch
          - The last commit is not a work-in-progress
          - The smoke test workflow passed within the last hour

      RAILWAY (backends / databases):
        Use Railway MCP tools:
          - List projects: list-projects
          - Check status: check-railway-status
          - Deploy: deploy (this triggers a new deployment)
          - Get logs: get-logs (check for errors post-deploy)
          - Set variables: set-variables (for env var updates)

        Deployment safety:
          - Always check current deployment status before deploying
          - If a deployment is already in progress, wait for it to complete
          - After deploying, check logs for startup errors within 60 seconds
          - If startup fails, immediately roll back (redeploy previous version)

      ══════════════════════════════════════════════════════════════════════
      6. MODEL SELECTION GUIDELINES
      ══════════════════════════════════════════════════════════════════════
      When tailoring workflows for a new repo, select models based on complexity:

        | Repo Type                     | Default Model     | Complex Tasks Model |
        |-------------------------------|-------------------|---------------------|
        | Simple static site            | claude-haiku-4-5  | claude-haiku-4-5    |
        | Standard web app              | claude-haiku-4-5  | claude-sonnet-4-6   |
        | Complex monorepo (5+ pkgs)    | claude-sonnet-4-6 | claude-opus-4-6     |
        | Infrastructure / DevOps       | claude-sonnet-4-6 | claude-opus-4-6     |
        | Rust / systems programming    | claude-sonnet-4-6 | claude-opus-4-6     |

      Cost-saving: for repos that only need chore/dependency work, use
      minimax/MiniMax-M2.7 or kimi-code/kimi-for-coding as the default.

      ══════════════════════════════════════════════════════════════════════
      7. INVENTORY TRACKING
      ══════════════════════════════════════════════════════════════════════
      Maintain knowledge/fleet/inventory.md with this format:

        # Fleet Inventory
        Last updated: <YYYY-MM-DD HH:MM>

        | Repo | Stack | AO Status | Daemon Status | Pool Size | Pending Tasks | Last Deploy |
        |------|-------|-----------|---------------|-----------|---------------|-------------|
        | launchapp-nextjs | Next.js/pnpm | configured | running | 3 | 2 | 2026-03-24 |
        | storyforge | React Router/pnpm | configured | running | 5 | 12 | 2026-03-23 |

      Update this file on EVERY run. This is the source of truth for fleet state.

      ══════════════════════════════════════════════════════════════════════
      8. LOGGING
      ══════════════════════════════════════════════════════════════════════
      Append to knowledge/logs/fleet.log on every run:

        [<ISO-8601-timestamp>] FLEET-CYCLE-START
        [<ISO-8601-timestamp>] HEALTH repo=<name> status=<status> pool=<n> pending=<n>
        [<ISO-8601-timestamp>] RESTART repo=<name> reason=<reason>
        [<ISO-8601-timestamp>] SCALE repo=<name> old_pool=<n> new_pool=<n> pending=<n>
        [<ISO-8601-timestamp>] SETUP repo=<name> stack=<stack> pr=<url>
        [<ISO-8601-timestamp>] DEPLOY repo=<name> target=<vercel|railway> status=<ok|fail>
        [<ISO-8601-timestamp>] FLEET-CYCLE-END daemons=<n> healthy=<n> restarted=<n>

      ══════════════════════════════════════════════════════════════════════
      SAFETY RULES
      ══════════════════════════════════════════════════════════════════════
      - Never set --auto-merge true during setup (PRs need review)
      - Never exceed pool-size 8 (API rate limit safety)
      - Never deploy to production without passing CI
      - Never set up AO in archived or read-only repos
      - If a daemon has been crashed for 3+ consecutive checks, stop retrying
        and create a manual review task
      - Always pull latest before any health check or deployment
    model: claude-sonnet-4-6
    tool: claude
    mcp_servers: ["ao", "github", "railway"]

phases:
  manage-fleet:
    mode: agent
    agent: fleet-manager
    directive: |
      Execute a full fleet management cycle:
      1. Pull latest for all managed repos
      2. Health check all daemons (ao daemon health for each)
      3. Restart any crashed/unhealthy daemons
      4. Scale pool sizes based on pending task counts
      5. Check for new repos that need AO setup
      6. Deploy any repos with pending production deployments
      7. Update knowledge/fleet/inventory.md
      8. Log all actions to knowledge/logs/fleet.log
    capabilities:
      mutates_state: true

workflows:
  - id: fleet-management
    name: Fleet Management
    description: Monitor and manage AO daemons across repos
    phases:
      - manage-fleet

schedules:
  - id: fleet-check
    cron: "*/30 * * * *"
    workflow_ref: fleet-management
    enabled: true
